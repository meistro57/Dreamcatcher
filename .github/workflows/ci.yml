name: Dreamcatcher CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: 3.11
  NODE_VERSION: 18
  ENABLE_SYSTEM_ACTIONS: "false"
  SYSTEM_ACTION_USERS: ""

jobs:
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: dreamcatcher_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 🔧 Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run backend smoke tests
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/dreamcatcher_test
          TEST_DATABASE_URL: postgresql://postgres:test_password@localhost:5432/dreamcatcher_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test_secret_key_for_ci
          ANTHROPIC_API_KEY: test_key
          OPENAI_API_KEY: test_key
          COMFYUI_ENABLED: false
        run: |
          cd backend
          python -m pytest tests/test_https_enforcement.py tests/test_admin_permissions_unit.py -v --tb=short

  test-frontend:
    name: 🎨 Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: |
          cd frontend
          npm ci

      - name: 🔍 Run linting
        run: |
          cd frontend
          npm run lint

      - name: 🧪 Run tests
        run: |
          cd frontend
          npm run test -- --run

      - name: 🏗️ Build frontend
        run: |
          cd frontend
          npm run build

      - name: 📊 Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/dist/

  code-quality:
    name: 🔍 Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📝 Python syntax check
        run: |
          cd backend
          python -m py_compile main.py api/routes.py api/auth_routes.py api/websocket_manager.py services/auth_service.py services/embedding_service.py tasks/embedding_tasks.py

  security-scan:
    name: 🔒 Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📊 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, code-quality]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Build Docker images
        run: |
          docker build -t dreamcatcher-backend:${{ github.sha }} backend/
          docker build -t dreamcatcher-frontend:${{ github.sha }} frontend/

      - name: 🏷️ Tag images
        run: |
          docker tag dreamcatcher-backend:${{ github.sha }} dreamcatcher-backend:latest
          docker tag dreamcatcher-frontend:${{ github.sha }} dreamcatcher-frontend:latest

      - name: 💾 Save Docker images
        run: |
          docker save dreamcatcher-backend:latest | gzip > backend-image.tar.gz
          docker save dreamcatcher-frontend:latest | gzip > frontend-image.tar.gz

      - name: 📊 Upload Docker artifacts
        uses: actions/upload-artifact@v3
        with:
          name: docker-images
          path: |
            backend-image.tar.gz
            frontend-image.tar.gz

  notify:
    name: 📢 Notify Results
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, code-quality, security-scan]
    if: always()

    steps:
      - name: 📊 Report Status
        run: |
          echo "🎉 CI/CD Pipeline Results:"
          echo "Backend Tests: ${{ needs.test-backend.result }}"
          echo "Frontend Tests: ${{ needs.test-frontend.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"

          if [ "${{ needs.test-backend.result }}" == "success" ] && \
             [ "${{ needs.test-frontend.result }}" == "success" ] && \
             [ "${{ needs.code-quality.result }}" == "success" ]; then
            echo "✅ All required checks passed."
          else
            echo "❌ Required checks failed."
            exit 1
          fi
